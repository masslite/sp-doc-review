<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>AlphaFund — Strategic Partnerships</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Source+Serif+4:ital,wght@0,400;0,600;0,700;1,400&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

/* ========== PASSWORD GATE ========== */
body{
  background:#fafafa;
  font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;
  color:#1a1a2e;
  -webkit-font-smoothing:antialiased;
}
#gate{
  min-height:100vh;display:flex;align-items:center;justify-content:center;
  background:#fafafa;
  padding:24px;
}
.gate-box{
  max-width:400px;width:100%;text-align:center;
}
.gate-mark{
  width:32px;height:32px;border-radius:50%;border:1.5px solid #1a1a2e;
  margin:0 auto 40px;display:flex;align-items:center;justify-content:center;
  opacity:0.5;
}
.gate-mark::after{content:'';width:6px;height:6px;border-radius:50%;background:#1a1a2e}
.gate-brand{
  font-size:0.7em;font-weight:500;letter-spacing:4px;text-transform:uppercase;
  color:#9ca3af;margin-bottom:32px;
}
.gate-title{
  font-family:'Source Serif 4',Georgia,serif;font-size:1.5em;font-weight:600;
  color:#1a1a2e;margin-bottom:12px;letter-spacing:-0.3px;
}
.gate-subtitle{
  font-size:0.85em;color:#6b7280;line-height:1.6;margin-bottom:40px;font-weight:300;
}
.gate-label{
  font-size:0.68em;font-weight:500;letter-spacing:2px;text-transform:uppercase;
  color:#9ca3af;text-align:left;display:block;margin-bottom:8px;
}
#pwd{
  width:100%;padding:14px 0;font-family:'Inter',sans-serif;font-size:0.95em;
  background:transparent;border:none;border-bottom:1.5px solid #d1d5db;
  color:#1a1a2e;letter-spacing:1px;outline:none;transition:border-color 0.3s;
}
#pwd:focus{border-color:#1a1a2e}
#pwd::placeholder{color:#d1d5db;letter-spacing:0.5px}
.gate-btn{
  display:block;width:100%;margin-top:32px;padding:14px;
  font-family:'Inter',sans-serif;font-size:0.82em;font-weight:500;
  letter-spacing:2px;text-transform:uppercase;
  background:#1a1a2e;color:#ffffff;border:none;cursor:pointer;
  border-radius:2px;transition:all 0.25s;
}
.gate-btn:hover{background:#2d2d4e}
.gate-btn:active{transform:scale(0.99)}
#error{
  display:none;font-size:0.8em;color:#dc2626;margin-top:16px;
  font-weight:400;letter-spacing:0.5px;
}
.gate-footer{
  font-size:0.65em;color:#d1d5db;margin-top:48px;letter-spacing:1px;
}

/* ========== DOCUMENT STYLES ========== */
body.unlocked{background:#ffffff;color:#1a1a2e;line-height:1.75}
body.unlocked #gate{display:none}

/* Subtle dot grid background */
body.unlocked::before{
  content:'';position:fixed;top:0;left:0;width:100%;height:100%;
  background-image:radial-gradient(circle,#e5e7eb 0.5px,transparent 0.5px);
  background-size:24px 24px;
  opacity:0.3;pointer-events:none;z-index:-1;
}

.container{max-width:780px;margin:0 auto;padding:0 32px 64px;position:relative}

/* Header */
.header{
  background:none!important;margin:0 -32px 48px;padding:64px 32px 40px;
  border-bottom:1px solid #e5e7eb;position:relative;border-radius:0;overflow:visible;
}
.header::before,.header::after{display:none!important}
.header h1{
  font-family:'Source Serif 4',Georgia,serif!important;font-size:2em;
  color:#1a1a2e!important;letter-spacing:-0.5px;margin-bottom:8px;font-weight:700;line-height:1.2;
}
.header .subtitle{
  font-family:'Inter',sans-serif!important;color:#6b7280!important;
  font-size:0.82em;font-weight:300;letter-spacing:1px;
}

/* Thesis */
.thesis{
  background:transparent!important;border-left:2px solid #1a1a2e!important;
  padding:0 0 0 24px!important;margin-bottom:48px;border-radius:0!important;
  font-family:'Source Serif 4',Georgia,serif;
  font-size:0.92em;line-height:1.9;box-shadow:none!important;color:#374151;
}
.thesis p{margin-bottom:14px}
.thesis p:last-child{margin-bottom:0}

/* Section headers */
h2{
  font-family:'Inter',sans-serif!important;font-size:0.72em!important;
  color:#9ca3af!important;padding-bottom:0!important;
  border-bottom:none!important;
  margin:64px 0 24px;letter-spacing:4px;text-transform:uppercase;font-weight:500;
}
h2:first-of-type{margin-top:0}

.section-note{
  font-family:'Source Serif 4',Georgia,serif;
  color:#6b7280;font-size:0.88em;margin-bottom:20px;font-style:italic;line-height:1.8;
}

/* Subgroup headings */
.subgroup-heading{
  font-family:'Inter',sans-serif!important;font-size:0.65em!important;
  color:#1a1a2e!important;text-transform:uppercase;letter-spacing:3px;font-weight:600!important;
  margin:40px 0 14px;padding:0!important;
  background:transparent!important;border-left:none!important;border-radius:0!important;
  opacity:0.7;
}
.subgroup-heading:first-of-type{margin-top:8px}

/* Partner cards */
details.partner{
  background:transparent!important;border:none!important;border-bottom:1px solid #f3f4f6!important;
  border-radius:0!important;margin-bottom:0!important;
  box-shadow:none!important;transition:background 0.2s;
}
details.partner:hover{background:rgba(249,250,251,0.8)!important;border-color:#f3f4f6!important}
details.partner[open]{background:rgba(249,250,251,0.5)!important;box-shadow:none!important;border-color:#e5e7eb!important}
details.partner:last-child{border-bottom:none!important}
details.partner summary{
  padding:16px 4px;cursor:pointer;list-style:none;
  display:flex;align-items:baseline;gap:12px;flex-wrap:wrap;
}
details.partner summary::-webkit-details-marker{display:none}
details.partner summary::before{
  content:'+';font-family:'Inter',sans-serif;color:#9ca3af;font-size:0.85em;
  font-weight:300;flex-shrink:0;width:16px;text-align:center;
  transition:all 0.15s;border:none!important;height:auto!important;
}
details.partner[open] summary::before{content:'\2212'}
details.partner summary h3{
  font-family:'Inter',sans-serif!important;font-size:0.9em;
  color:#1a1a2e!important;display:inline;letter-spacing:-0.2px;font-weight:500;
}
details.partner summary .summary-role{
  font-family:'Inter',sans-serif!important;font-size:0.72em;
  color:#9ca3af!important;font-weight:300;
}

/* Tags — refined pills */
.tag{
  display:inline-block;padding:2px 8px;
  font-family:'Inter',sans-serif!important;font-size:0.58em!important;
  font-weight:500!important;text-transform:uppercase;letter-spacing:1px;
  border:none!important;border-radius:2px!important;
  transform:none!important;flex-shrink:0;margin-left:auto;
}
.tag-core{background:#eff6ff;color:#1e40af}
.tag-data{background:#f0fdf4;color:#166534}
.tag-agents{background:#f5f3ff;color:#5b21b6}
.tag-compute{background:#fffbeb;color:#92400e}
.tag-geospatial{background:#f0f9ff;color:#075985}
.tag-advisory{background:#eef2ff;color:#3730a3}
.tag-stretch{background:#f8fafc;color:#475569}
.tag-energy{background:#fefce8;color:#854d0e}
.tag-trade{background:#ecfeff;color:#155e75}
.tag-private{background:#fdf2f8;color:#9d174d}
.tag-industry{background:#f0fdf4;color:#166534}
.tag-payments{background:#fff7ed;color:#9a3412}
.tag-adtech{background:#faf5ff;color:#6b21a8}
.tag-credit{background:#eff6ff;color:#1e40af}
.tag-business{background:#f8fafc;color:#334155}
.tag-fintech{background:#ecfdf5;color:#065f46}

/* Detail body */
details.partner .detail-body{
  padding:0 4px 20px 32px;border-top:none!important;margin:0!important;padding-top:0;
}
details.partner .detail-body .role{
  font-family:'Inter',sans-serif!important;font-size:0.72em;
  color:#9ca3af!important;margin-bottom:10px;font-weight:400;
}
details.partner .detail-body .desc{
  font-family:'Source Serif 4',Georgia,serif;
  font-size:0.88em;margin-bottom:12px;line-height:1.85;color:#374151;
}
details.partner .detail-body .rationale{
  font-size:0.82em;color:#6b7280;
  background:transparent!important;padding:0!important;margin-top:12px;
  border-left:2px solid #e5e7eb!important;padding-left:16px!important;
  border-radius:0!important;line-height:1.8;
  font-family:'Source Serif 4',Georgia,serif;
}
details.partner .detail-body .rationale strong{
  font-family:'Inter',sans-serif!important;font-size:0.78em!important;
  color:#1a1a2e!important;letter-spacing:1px;text-transform:uppercase;font-weight:600;
}
details.partner .detail-body .cross-ref{
  font-size:0.8em;color:#6b7280!important;font-style:italic;
  margin-bottom:10px;padding:0!important;background:transparent!important;
  display:inline-block;border-radius:0!important;
}

hr{border:none;border-top:1px solid #e5e7eb;margin:56px 0}

.end-note{
  font-family:'Source Serif 4',Georgia,serif;
  font-size:0.88em;color:#6b7280;line-height:1.85;
  padding:0!important;background:transparent!important;
  border:none!important;box-shadow:none!important;
  border-top:1px solid #e5e7eb;padding-top:24px!important;
}
.end-note strong{color:#1a1a2e}

.footer{
  text-align:left!important;padding:32px 0 0;color:#d1d5db;
  font-family:'Inter',sans-serif!important;font-size:0.65em;
  letter-spacing:2px;text-transform:uppercase;
  border-top:none!important;margin-top:48px;
}

/* Fade in */
#doc{opacity:0;transition:opacity 0.6s ease-in}
#doc.visible{opacity:1}

@media print{
  body.unlocked::before{display:none}
}
@media(max-width:768px){
  .container{padding:0 20px 40px}
  .header{margin:0 -20px 40px;padding:40px 20px 32px}
  .header h1{font-size:1.5em!important}
  .gate-box{padding:0 8px}
}
</style>
</head>
<body>

<div id="gate">
  <div class="gate-box">
    <div class="gate-mark"></div>
    <div class="gate-brand">AlphaFund</div>
    <div class="gate-title">Access Required</div>
    <div class="gate-subtitle">This document is protected.<br>Enter the access code to continue.</div>
    <label class="gate-label">Access Code</label>
    <input type="password" id="pwd" placeholder="Enter code" autocomplete="off" autofocus>
    <button class="gate-btn" onclick="unlock()">Continue</button>
    <div id="error">Incorrect access code</div>
    <div class="gate-footer">AlphaFund &mdash; Confidential</div>
  </div>
</div>

<div id="doc" style="display:none">
  <div id="content"></div>
</div>

async function unlock(){
  var pwd=document.getElementById('pwd').value;
  try{
    var raw=Uint8Array.from(atob(E),function(c){return c.charCodeAt(0)});
    var salt=raw.slice(0,16);
    var iv=raw.slice(16,28);
    var ct=raw.slice(28);
    var km=await crypto.subtle.importKey('raw',new TextEncoder().encode(pwd),'PBKDF2',false,['deriveKey']);
    var key=await crypto.subtle.deriveKey({name:'PBKDF2',salt:salt,iterations:100000,hash:'SHA-256'},km,{name:'AES-GCM',length:256},false,['decrypt']);
    var dec=await crypto.subtle.decrypt({name:'AES-GCM',iv:iv},key,ct);
    document.getElementById('content').innerHTML=new TextDecoder().decode(dec);
    document.getElementById('doc').style.display='block';
    document.getElementById('gate').style.display='none';
    document.body.classList.add('unlocked');
    setTimeout(function(){document.getElementById('doc').classList.add('visible')},50);
    window.scrollTo(0,0);
  }catch(e){
    var err=document.getElementById('error');
    err.style.display='block';
    document.getElementById('pwd').value='';
    document.getElementById('pwd').focus();
    setTimeout(function(){err.style.display='none'},2500);
  }
}
